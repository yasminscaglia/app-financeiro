<ion-header [translucent]="true">
  <ion-toolbar class="phone">
    <p class="toolbar-title">Acesso Financeiro</p>
    <p class="toolbar-sub">Sistema de Gestão</p>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-card class="login-card">
    <ion-card-header>
      <ion-card-title class="lc-title">Bem-vindo</ion-card-title>
      <ion-card-subtitle class="lc-sub">Por favor, faça o login para continuar</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      <ion-item class="custom-item" lines="none">
        <ion-label position="stacked" class="field-ion-label">Nome:</ion-label>
        <ion-input [(ngModel)]="login.nome" placeholder="Digite seu nome..." class="field-input"></ion-input>
      </ion-item>

      <ion-item class="custom-item" lines="none">
        <ion-label position="stacked" class="field-ion-label">Senha:</ion-label>
        <ion-input [(ngModel)]="login.senha" placeholder="Digite sua senha:" class="field-input"></ion-input>
      </ion-item>

      <ion-button expand="block" (click)="acessarMenu()" class="btn-login">Avançar</ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
